<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crack&Wish - Çok Yakında</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Yolladığın görsele uygun sıcak (şeftali/mor/kızıl) degrade arka plan */
            background: linear-gradient(135deg, #e37e6b 0%, #c46376 40%, #85618f 80%, #685b88 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .container {
            padding: 2rem;
            animation: fadeIn 1.5s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Kurabiye İkonu */
        .icon-container {
            margin-bottom: 1.5rem;
        }

        .icon-container svg {
            width: 100px;
            height: 100px;
            fill: #ffffff;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.2));
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .badge {
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 2rem;
        }

        p.subtitle {
            font-size: 1.15rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3.5rem;
            max-width: 480px;
            line-height: 1.7;
        }

        .store-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .store-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            cursor: pointer;
        }

        .store-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .store-btn span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p.subtitle { font-size: 1.05rem; padding: 0 20px; }
            .store-buttons { flex-direction: column; gap: 1rem; width: 100%; padding: 0 40px; }
            .store-btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Kurabiye İkonu -->
        <div class="icon-container">
            <img src="cookie_icon.png" alt="Crack&Wish Cookie" style="width: 130px; height: auto; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.2));">
        </div>

        <h1>Crack&Wish</h1>
        <div class="badge">COMING SOON</div>
        <p class="subtitle">Gizemli bir evren, sürpriz kurabiyeler ve sihirli tarot kartları avucunun içinde. Uygulama mağazalarında yerimizi almamıza çok az kaldı.</p>
        
        <div class="store-buttons">
            <div class="store-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91 1.65.09 3.01.69 3.87 1.9-3.26 1.83-2.69 6.22.42 7.55-.7 1.76-1.61 3.49-3.04 5.31zM13.8 4.09c.67-1.11 1.4-2.73.54-4.09-1.28.16-3.07 1.05-3.8 2.22-.62 1-1.45 2.62-.64 4.04 1.43.1 3.01-.89 3.9-2.17z"/></svg>
                App Store'dan <span>İndirin</span>
            </div>
            <div class="store-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17c0-.83.67-1.5 1.5-1.5h15c.83 0 1.5.67 1.5 1.5v17c0 .83-.67 1.5-1.5 1.5h-15c-.83 0-1.5-.67-1.5-1.5zm8.5-10.43l3.78-3.78c.24-.24.24-.63 0-.87-.24-.24-.63-.24-.87 0l-3.35 3.35-1.59-1.59c-.24-.24-.63-.24-.87 0l-3.09 3.09c-.24.24-.24.63 0 .87.24.24.63.24.87 0l2.66-2.66 1.59 1.59c.24.24.63.24.87 0z"/></svg>
                Google Play'den <span>İndirin</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="/privacy.html">Gizlilik Politikası</a>
        <span>•</span>
        <a href="/terms.html">Kullanım Koşulları</a>
    </div>

</body>
</html>
