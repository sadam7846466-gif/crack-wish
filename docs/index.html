<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crack&Wish - Çok Yakında</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e37e6b 0%, #c46376 40%, #85618f 80%, #685b88 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Arka planda uçuşan bulanık ışıklar (Glassmorphism hissiyatını artırır) */
        .ambient-light-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
        }
        .ambient-light-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: rgba(247, 148, 29, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* İÇERİK KUTUSU (Çerçeve Kaldırıldı) */
        .glass-panel {
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-container {
            margin-bottom: 1.5rem;
        }

        .icon-container img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.25));
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3.5rem;
            max-width: 480px;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* YAN YANA CAM BUTONLAR */
        .store-buttons {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            justify-content: center;
            width: 100%;
        }

        .store-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 18px;
            border-radius: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            flex: 1; /* Butonların genişliklerini eşitle ve sığdır */
            max-width: 220px;
            justify-content: center;
        }

        .store-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }

        .store-btn svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        .store-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
            text-align: left;
        }

        .small-text {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.8);
        }

        .large-text {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* MOBİL UYUM (BUTONLAR YAN YANA KALMAYA ZORLANIYOR) */
        @media (max-width: 500px) {
            .glass-panel { padding: 40px 20px; }
            h1 { font-size: 2.3rem; }
            p.subtitle { font-size: 1rem; margin-bottom: 2.5rem; }
            
            .store-buttons { 
                gap: 0.6rem; 
            }
            .store-btn { 
                padding: 8px 10px; 
                border-radius: 14px;
                gap: 8px;
            }
            .store-btn svg {
                width: 24px;
                height: 24px;
            }
            .large-text { font-size: 0.95rem; }
            .small-text { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <div class="container">
        <!-- BLUR CAM PANEL BAŞLANGICI -->
        <div class="glass-panel">
            <div class="icon-container">
                <img src="cookie_icon.png" alt="Crack&Wish Cookie">
            </div>

            <h1>Crack&Wish</h1>
            <div class="badge">COMING SOON</div>
            <p class="subtitle">Gizemli bir evren, sürpriz kurabiyeler ve sihirli tarot kartları avucunun içinde. Uygulama mağazalarında yerimizi almamıza çok az kaldı.</p>
            
            <!-- CAM EFEKTLİ YAN YANA BUTONLAR -->
            <div class="store-buttons">
                <div class="store-btn">
                    <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91 1.65.09 3.01.69 3.87 1.9-3.26 1.83-2.69 6.22.42 7.55-.7 1.76-1.61 3.49-3.04 5.31zM13.8 4.09c.67-1.11 1.4-2.73.54-4.09-1.28.16-3.07 1.05-3.8 2.22-.62 1-1.45 2.62-.64 4.04 1.43.1 3.01-.89 3.9-2.17z"/></svg>
                    <div class="store-text">
                        <span class="small-text">Download on the</span>
                        <span class="large-text">App Store</span>
                    </div>
                </div>
                <div class="store-btn">
                    <svg viewBox="0 0 24 24" fill="#ffffff"><path d="M3.5,2C3.2,2.3 3,2.7 3,3.3v17.4c0,0.6 0.2,1 0.5,1.3l0.1,0.1l9.7-9.7v-0.2L3.6,2L3.5,2z"/><path d="M16.5,15l-3.2-3.2v-0.2l3.2-3.2l0.1,0.1l3.8,2.2c1.1,0.6 1.1,1.6 0,2.2l-3.8,2.2L16.5,15z"/><path d="M13.3,12L3.6,21.7C3.9,21.9 4.3,21.9 4.8,21.6l11.7-6.7L13.3,12z"/><path d="M13.3,12l3.2-3.2l-11.7-6.7c-0.5-0.3-0.9-0.3-1.2-0.1L13.3,12z"/></svg>
                    <div class="store-text">
                        <span class="small-text">GET IT ON</span>
                        <span class="large-text">Google Play</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- BLUR CAM PANEL BİTİŞİ -->
    </div>

    <div class="footer">
        <a href="/privacy.html">Gizlilik Politikası</a>
        <span>•</span>
        <a href="/terms.html">Kullanım Koşulları</a>
    </div>

</body>
</html>
